# LinkedIn AI/ML Auto-Poster Configuration Example
# Copy this file to config.yaml and fill in your details

# Your LinkedIn Profile Information
profile:
  name: "Your Name"
  title: "AI/ML Engineer | Data Scientist"
  skills:
    - "Machine Learning"
    - "Deep Learning"
    - "Natural Language Processing"
    - "Computer Vision"
    - "Python"
    - "TensorFlow"
    - "PyTorch"
  experience_years: 5
  expertise_areas:
    - "Neural Networks"
    - "LLMs"
    - "AI Research"
    - "MLOps"
  # Optional: Add relevant projects to reference in posts (helps connect news to your experience)
  projects:
    - name: "LLM Fine-tuning Project"
      technologies: ["PyTorch", "HuggingFace", "GPT-4"]
      description: "Fine-tuned language models for specific use cases"
    - name: "Computer Vision System"
      technologies: ["TensorFlow", "YOLOv8", "OpenCV"]
      description: "Built object detection system for real-time applications"
    # Add more projects as needed - these will be referenced when relevant to the news

# LinkedIn API Credentials
linkedin:
  client_id: "YOUR_LINKEDIN_CLIENT_ID"
  client_secret: "YOUR_LINKEDIN_CLIENT_SECRET"
  access_token: "YOUR_ACCESS_TOKEN"
  # Get these from: https://www.linkedin.com/developers/apps

# AI/ML News Sources - Focus on OpenAI, NVIDIA, and Tech Giants
news:
  sources:
    - "https://www.theverge.com/ai-artificial-intelligence"
    - "https://techcrunch.com/tag/artificial-intelligence/"
    - "https://venturebeat.com/ai/"
    - "https://www.theverge.com/tag/openai"
    - "https://www.theverge.com/tag/nvidia"
  rss_feeds:
    - "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"
    - "https://techcrunch.com/feed/"
    - "https://www.theverge.com/rss/index.xml"
    - "https://feeds.feedburner.com/venturebeat/SZYF"
    - "https://www.wired.com/feed/rss"
  # Alternative: Use news API (requires API key) - Recommended for better tech giants coverage
  use_news_api: false
  news_api_key: "YOUR_NEWS_API_KEY"  # Optional: Get from https://newsapi.org/

# Post Generation Settings
post_generation:
  ai_model: "gpt-4"  # or "gpt-3.5-turbo" for cost savings
  openai_api_key: "YOUR_OPENAI_API_KEY"
  tone: "professional"  # professional, engaging, technical
  max_post_length: 3000  # LinkedIn character limit
  include_hashtags: true
  hashtags:
    # Use 3-5 hashtags maximum (best mix: 1 broad + 1 role-based + 1 tool/topic + 1 career)
    - "#AI"                    # Broad
    - "#MachineLearning"       # Role-based / Tool
    - "#TechCareers"            # Career
    # Optional: Add 1-2 more based on the specific tech giant in the news
    # - "#OpenAI"               # Use when OpenAI news
    # - "#NVIDIA"                # Use when NVIDIA news

# Posting Schedule
schedule:
  enabled: true
  frequency: "daily"  # daily, weekly, or custom cron
  time: "09:00"  # Post time (24-hour format)
  timezone: "UTC"

# Content Filtering - Focus on Tech Giants
content:
  min_article_age_hours: 0  # Only post articles newer than this
  max_article_age_hours: 48  # Don't post articles older than this
  keywords_required:
    # At least one of these tech giants should be mentioned
    - "OpenAI"
    - "NVIDIA"
    - "Google"
    - "Microsoft"
    - "Meta"
    - "Apple"
    - "Amazon"
    - "Anthropic"
    - "GPT-4"
    - "ChatGPT"
    - "Gemini"
    - "Claude"
    - "Llama"
    - "Copilot"
  keywords_excluded:
    - "crypto"
    - "bitcoin"

