# AutoPost AI - LinkedIn Content Generator
# Copy this file to config.yaml and fill in your details
#
# Powered by OpenAI Web Search + RSS scraping.
# Env vars can override: OPENAI_API_KEY, LINKEDIN_ACCESS_TOKEN, NEWS_FETCH_METHOD, etc.

# Your LinkedIn Profile Information
profile:
  name: "Your Name"
  title: "AI/ML Engineer | Data Scientist"
  skills:
    - "Machine Learning"
    - "Deep Learning"
    - "Natural Language Processing"
    - "Computer Vision"
    - "Python"
    - "TensorFlow"
    - "PyTorch"
  experience_years: 5
  expertise_areas:
    - "Neural Networks"
    - "LLMs"
    - "AI Research"
    - "MLOps"

# LinkedIn API Credentials
linkedin:
  client_id: "YOUR_LINKEDIN_CLIENT_ID"
  client_secret: "YOUR_LINKEDIN_CLIENT_SECRET"
  access_token: "YOUR_ACCESS_TOKEN"
  # Get these from: https://www.linkedin.com/developers/apps

# News Search Settings
news:
  # How to fetch news: "both" (AI + RSS scraping), "ai" (OpenAI web search only), "scraping" (RSS only)
  fetch_method: "both"

  # Model used for web search (when fetch_method is "ai" or "both")
  search_model: "gpt-4o-mini"

  # Default topics to search for (can also be changed from the UI)
  topics:
    - "OpenAI"
    - "NVIDIA"
    - "Google AI"
    - "Microsoft AI"
    - "Meta AI"
    - "Anthropic"
    - "AI models"
    - "generative AI"
    - "LLM"

  # Pool and filtering - ensures best posts from high-value articles
  fetch_pool_size: 20      # Fetch this many articles, then pick top by score
  max_age_hours: 72        # Only include articles from the last N hours (default 72 = 3 days)
  min_value_score: 50      # Only use articles scoring >= this (0-110 scale). Raise to 60+ for stricter filtering.

  # Multi-Article Storytelling Mode
  use_multiple_articles: false
  articles_per_post: 3

# Post Settings
post:
  include_image: true    # Attach image to LinkedIn posts (og:image from article or DALL-E)

# Post Generation Settings
post_generation:
  ai_model: "gpt-4"           # Model for writing posts (gpt-4 recommended for quality)
  openai_api_key: "YOUR_OPENAI_API_KEY"
  tone: "professional"
  max_post_length: 3000
  include_hashtags: true
  hashtags:
    - "#AI"
    - "#MachineLearning"
    - "#ArtificialIntelligence"
    - "#TechNews"
    - "#Innovation"
    - "#OpenAI"
    - "#NVIDIA"

# Posting Schedule
schedule:
  enabled: true
  frequency: "daily"
  time: "09:00"
  timezone: "UTC"
