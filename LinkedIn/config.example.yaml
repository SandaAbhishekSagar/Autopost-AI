# ─────────────────────────────────────────────────────────────────────────────
# LINKEDIN API (never commit real tokens — use env vars in production)
# ─────────────────────────────────────────────────────────────────────────────
linkedin:
  client_id: "YOUR_LINKEDIN_CLIENT_ID"
  client_secret: "YOUR_LINKEDIN_CLIENT_SECRET"
  access_token: "YOUR_ACCESS_TOKEN"

# ─────────────────────────────────────────────────────────────────────────────
# BLOG — content source when news.fetch_method is "blog"
# ─────────────────────────────────────────────────────────────────────────────
blog:
  url: "https://www.abhisheksagarsanda.com/blog"
  source: "Abhishek Sagar Sanda's Blog"
  author_name: "Abhishek Sagar Sanda"
  linkedin_url: "https://www.linkedin.com/in/sandaabhisheksagar/"
  enrich_posts: false
  hashtags:
    - "#ConversationalAI"
    - "#RAG"
    - "#LLM"
    - "#AIEngineering"
    - "#NLP"
    - "#Chatbots"
    - "#MachineLearning"

# ─────────────────────────────────────────────────────────────────────────────
news:
  fetch_method: "blog"
  search_model: "gpt-4o-mini"
  topics:
    - "OpenAI"
    - "RAG"
    - "LLM"
    - "Conversational AI"
  fetch_pool_size: 15
  max_age_hours: 72
  min_value_score: 50
  use_multiple_articles: false
  articles_per_post: 3

post:
  include_image: true

post_generation:
  ai_model: "gpt-4o"
  openai_api_key: "YOUR_OPENAI_API_KEY"
  tone: "professional"
  max_post_length: 3000
  include_hashtags: true
  hashtags:
    - "#AI"
    - "#MachineLearning"
    - "#ConversationalAI"
    - "#RAG"

schedule:
  enabled: true
  frequency: "daily"
  time: "09:00"
  timezone: "America/New_York"
