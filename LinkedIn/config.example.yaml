# AutoPost AI - LinkedIn Content Generator
# Copy this file to config.yaml and fill in your details
#
# Now powered by OpenAI Web Search - no RSS feeds, NewsAPI keys, or scraping needed.
# Just provide your OpenAI API key and the app searches the web for the latest AI news.

# Your LinkedIn Profile Information
profile:
  name: "Your Name"
  title: "AI/ML Engineer | Data Scientist"
  skills:
    - "Machine Learning"
    - "Deep Learning"
    - "Natural Language Processing"
    - "Computer Vision"
    - "Python"
    - "TensorFlow"
    - "PyTorch"
  experience_years: 5
  expertise_areas:
    - "Neural Networks"
    - "LLMs"
    - "AI Research"
    - "MLOps"

# LinkedIn API Credentials
linkedin:
  client_id: "YOUR_LINKEDIN_CLIENT_ID"
  client_secret: "YOUR_LINKEDIN_CLIENT_SECRET"
  access_token: "YOUR_ACCESS_TOKEN"
  # Get these from: https://www.linkedin.com/developers/apps

# News Search Settings (powered by OpenAI Web Search)
news:
  # Model used for web search via Responses API + web_search tool
  # gpt-4o-mini is fast and cheap; use gpt-4o for more thorough results
  search_model: "gpt-4o-mini"

  # Default topics to search for (can also be changed from the UI)
  topics:
    - "OpenAI"
    - "NVIDIA"
    - "Google AI"
    - "Microsoft AI"
    - "Meta AI"
    - "Anthropic"
    - "AI models"
    - "generative AI"
    - "LLM"

  # Multi-Article Storytelling Mode
  use_multiple_articles: false
  articles_per_post: 3

# Post Generation Settings
post_generation:
  ai_model: "gpt-4"           # Model for writing posts (gpt-4 recommended for quality)
  openai_api_key: "YOUR_OPENAI_API_KEY"
  tone: "professional"
  max_post_length: 3000
  include_hashtags: true
  hashtags:
    - "#AI"
    - "#MachineLearning"
    - "#ArtificialIntelligence"
    - "#TechNews"
    - "#Innovation"
    - "#OpenAI"
    - "#NVIDIA"

# Posting Schedule
schedule:
  enabled: true
  frequency: "daily"
  time: "09:00"
  timezone: "UTC"
