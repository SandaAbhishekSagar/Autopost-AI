[phases.setup]
nixPkgs = ["python313", "python313Packages.pip", "python313Packages.setuptools", "python313Packages.wheel"]

[phases.install]
cmds = [
  "python3 -m ensurepip --upgrade --default-pip || true",
  "python3 -m pip install --upgrade pip setuptools wheel || pip3 install --upgrade pip setuptools wheel",
  "python3 -m pip install -r requirements.txt || pip3 install -r requirements.txt"
]

[phases.build]
cmds = ["echo 'Build complete'"]

[start]
cmd = "python3 app.py"

