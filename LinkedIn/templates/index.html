<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn AI/ML Auto-Poster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .status.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }

        .status.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #3b82f6;
        }

        .posts-container {
            display: grid;
            gap: 20px;
        }

        .post-card {
            border: 2px solid #e5e7eb;
            border-radius: 15px;
            padding: 25px;
            background: #f9fafb;
            transition: all 0.3s ease;
        }

        .post-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.1);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .article-info {
            flex: 1;
        }

        .article-info h3 {
            color: #1f2937;
            margin-bottom: 5px;
            font-size: 1.2em;
        }

        .article-info p {
            color: #6b7280;
            font-size: 0.9em;
        }

        .post-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .post-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-small {
            padding: 10px 20px;
            font-size: 14px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .config-status {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .status-dot.green {
            background: #10b981;
        }

        .status-dot.red {
            background: #ef4444;
        }

        .num-posts-select {
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            background: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 LinkedIn AI/ML Auto-Poster</h1>
            <p>Generate, Review & Post Engaging LinkedIn Content</p>
        </div>

        <div class="content">
            <div class="config-status" id="configStatus">
                <div class="status-item">
                    <span class="status-dot" id="openaiStatus"></span>
                    <span>OpenAI API</span>
                </div>
                <div class="status-item">
                    <span class="status-dot" id="linkedinStatus"></span>
                    <span>LinkedIn API</span>
                </div>
            </div>

            <div class="status" id="statusMessage"></div>

            <div class="controls">
                <select class="num-posts-select" id="numPosts">
                    <option value="1">1 Post</option>
                    <option value="2">2 Posts</option>
                    <option value="3">3 Posts</option>
                </select>
                <button class="btn btn-primary" id="generateBtn" onclick="generatePosts()">
                    <span>✨</span>
                    Generate Post
                </button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Generating your post...</p>
            </div>

            <div class="posts-container" id="postsContainer"></div>
        </div>
    </div>

    <script>
        // Global variable to store posts data
        let postsData = [];

        // Check status on load
        window.addEventListener('load', checkStatus);

        async function checkStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                if (data.initialized) {
                    document.getElementById('openaiStatus').className = 
                        data.config.openai_configured ? 'status-dot green' : 'status-dot red';
                    document.getElementById('linkedinStatus').className = 
                        data.config.linkedin_configured ? 'status-dot green' : 'status-dot red';
                } else {
                    showStatus('error', 'Agent not initialized. Check your configuration.');
                }
            } catch (error) {
                console.error('Error checking status:', error);
            }
        }

        async function generatePosts() {
            const numPosts = parseInt(document.getElementById('numPosts').value);
            const generateBtn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const postsContainer = document.getElementById('postsContainer');

            // Show loading
            generateBtn.disabled = true;
            loading.style.display = 'block';
            postsContainer.innerHTML = '';
            hideStatus();

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ num_posts: numPosts })
                });

                const data = await response.json();

                if (data.success) {
                    displayPosts(data.posts);
                    showStatus('success', `Successfully generated ${data.posts.length} post(s)!`);
                } else {
                    showStatus('error', data.error || 'Failed to generate posts');
                }
            } catch (error) {
                showStatus('error', 'Error generating posts: ' + error.message);
            } finally {
                generateBtn.disabled = false;
                loading.style.display = 'none';
            }
        }

        function displayPosts(posts) {
            const container = document.getElementById('postsContainer');
            container.innerHTML = '';
            
            // Store posts data globally for button handlers
            postsData = posts;

            posts.forEach((post, index) => {
                const card = document.createElement('div');
                card.className = 'post-card';
                
                // Build scoring HTML if available
                let scoringHTML = '';
                if (post.scoring) {
                    const score = post.scoring.score;
                    const percentage = post.scoring.percentage;
                    const priority = post.scoring.priority;
                    const recommendation = post.scoring.recommendation;
                    const reasons = post.scoring.reasons || [];
                    
                    // Determine color based on score
                    let scoreColor = '#ef4444'; // red
                    if (score >= 60) scoreColor = '#10b981'; // green
                    else if (score >= 40) scoreColor = '#f59e0b'; // yellow
                    
                    scoringHTML = `
                        <div class="scoring-section" style="background: #f3f4f6; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid ${scoreColor};">
                            <h4 style="margin: 0 0 10px 0; color: #1f2937;">📊 Value Scoring</h4>
                            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px;">
                                <div>
                                    <strong style="color: ${scoreColor}; font-size: 24px;">${score}/110</strong>
                                    <p style="margin: 5px 0 0 0; color: #6b7280; font-size: 14px;">${percentage}% Score</p>
                                </div>
                                <div>
                                    <strong style="color: #1f2937;">Priority:</strong>
                                    <p style="margin: 5px 0 0 0; color: #6b7280;">${priority}</p>
                                </div>
                                <div>
                                    <strong style="color: #1f2937;">Recommendation:</strong>
                                    <p style="margin: 5px 0 0 0; color: #6b7280; font-size: 13px;">${recommendation}</p>
                                </div>
                            </div>
                            ${reasons.length > 0 ? `
                                <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #e5e7eb;">
                                    <strong style="color: #1f2937; font-size: 13px;">Why:</strong>
                                    <p style="margin: 5px 0 0 0; color: #6b7280; font-size: 12px;">${reasons.slice(0, 3).join(' • ')}</p>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }
                
                card.innerHTML = `
                    <div class="post-header">
                        <div class="article-info">
                            <h3>${escapeHtml(post.article.title)}</h3>
                            <p>Source: ${escapeHtml(post.article.source)}</p>
                            ${post.article.url ? `<p><a href="${post.article.url}" target="_blank">View Article</a></p>` : ''}
                        </div>
                    </div>
                    ${scoringHTML}
                    <div class="post-content">${escapeHtml(post.content)}</div>
                    <div class="post-actions">
                        <button class="btn btn-success btn-small" data-post-index="${index}" onclick="postToLinkedIn(event, this)">
                            <span>📤</span>
                            Post to LinkedIn
                        </button>
                        <button class="btn btn-primary btn-small" data-post-index="${index}" onclick="copyToClipboard(event, this)">
                            <span>📋</span>
                            Copy Text
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function postToLinkedIn(event, button) {
            if (!confirm('Are you sure you want to post this to LinkedIn?')) {
                return;
            }

            const btn = button || event.target.closest('button');
            const index = parseInt(btn.getAttribute('data-post-index'));
            
            if (isNaN(index) || index < 0 || index >= postsData.length) {
                showStatus('error', 'Post data not found');
                return;
            }

            const postData = postsData[index];

            btn.disabled = true;
            btn.innerHTML = '<span>⏳</span> Posting...';

            try {
                const response = await fetch('/api/post', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        content: postData.content,
                        article_url: postData.article.url
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showStatus('success', data.message || 'Post successfully published to LinkedIn!');
                    btn.innerHTML = '<span>✅</span> Posted!';
                } else {
                    showStatus('error', data.error || 'Failed to post to LinkedIn');
                    btn.disabled = false;
                    btn.innerHTML = '<span>📤</span> Post to LinkedIn';
                }
            } catch (error) {
                showStatus('error', 'Error posting to LinkedIn: ' + error.message);
                btn.disabled = false;
                btn.innerHTML = '<span>📤</span> Post to LinkedIn';
            }
        }

        function copyToClipboard(event, button) {
            const btn = button || event.target.closest('button');
            const index = parseInt(btn.getAttribute('data-post-index'));
            const postCards = document.querySelectorAll('.post-card');
            
            if (index >= 0 && index < postCards.length) {
                const postContent = postCards[index].querySelector('.post-content');
                if (postContent) {
                    const textToCopy = postContent.textContent || postContent.innerText;
                    navigator.clipboard.writeText(textToCopy).then(() => {
                        showStatus('success', 'Post content copied to clipboard!');
                    }).catch(err => {
                        showStatus('error', 'Failed to copy to clipboard: ' + err.message);
                    });
                } else {
                    showStatus('error', 'Post content not found');
                }
            } else {
                showStatus('error', 'Invalid post index');
            }
        }

        function showStatus(type, message) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.className = `status ${type}`;
            statusEl.textContent = message;
            statusEl.style.display = 'block';
        }

        function hideStatus() {
            document.getElementById('statusMessage').style.display = 'none';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
