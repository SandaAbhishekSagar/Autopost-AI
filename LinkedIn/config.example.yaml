# LinkedIn AI/ML Auto-Poster Configuration Example
# Copy this file to config.yaml and fill in your details

# Your LinkedIn Profile Information
profile:
  name: "Your Name"
  title: "AI/ML Engineer | Data Scientist"
  skills:
    - "Machine Learning"
    - "Deep Learning"
    - "Natural Language Processing"
    - "Computer Vision"
    - "Python"
    - "TensorFlow"
    - "PyTorch"
  experience_years: 5
  expertise_areas:
    - "Neural Networks"
    - "LLMs"
    - "AI Research"
    - "MLOps"

# LinkedIn API Credentials
linkedin:
  client_id: "YOUR_LINKEDIN_CLIENT_ID"
  client_secret: "YOUR_LINKEDIN_CLIENT_SECRET"
  access_token: "YOUR_ACCESS_TOKEN"
  # Get these from: https://www.linkedin.com/developers/apps

# AI/ML News Sources - Focus on OpenAI, NVIDIA, and Tech Giants
news:
  # RSS Feeds - Primary sources for AI/ML news
  rss_feeds:
    - "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"
    - "https://techcrunch.com/category/artificial-intelligence/feed/"
    - "https://www.reuters.com/rsrss/technologyNews/"
  
  # Hacker News API integration (Firebase API)
  use_hacker_news: true  # Fetch top stories from Hacker News
  
  # Alternative: Use news API (requires API key) - Recommended for better tech giants coverage
  use_news_api: false
  news_api_key: "YOUR_NEWS_API_KEY"  # Optional: Get from https://newsapi.org/
  
  # Multi-Article Storytelling Mode
  use_multiple_articles: true  # Set to true to combine multiple articles into storytelling posts
  articles_per_post: 3  # Number of articles to combine (minimum 2, recommended 3-5)
  
  # Article age filtering
  min_article_age_hours: 0  # Only post articles newer than this
  max_article_age_hours: 48  # Don't post articles older than this
  
  # Keyword filtering
  keywords_required:
    # At least one of these should be mentioned (AI/ML related)
    - "AI"
    - "machine learning"
    - "artificial intelligence"
  keywords_excluded:
    - "crypto"
    - "bitcoin"

# Post Generation Settings
post_generation:
  ai_model: "gpt-4"  # or "gpt-3.5-turbo" for cost savings (gpt-4 recommended for longer, better posts)
  openai_api_key: "YOUR_OPENAI_API_KEY"
  tone: "professional"  # professional, engaging, technical
  max_post_length: 3000  # LinkedIn character limit (posts will be 800-2000 chars for professional quality)
  include_hashtags: true
  hashtags:
    - "#AI"
    - "#MachineLearning"
    - "#ArtificialIntelligence"
    - "#TechNews"
    - "#Innovation"
    - "#OpenAI"
    - "#NVIDIA"
    - "#TechGiants"
    - "#AITech"

# Posting Schedule
schedule:
  enabled: true
  frequency: "daily"  # daily, weekly, or custom cron
  time: "09:00"  # Post time (24-hour format)
  timezone: "UTC"

